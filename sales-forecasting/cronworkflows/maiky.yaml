apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: maiky
  namespace: sales-forecasting
  labels:
    platform.example.com/environment: prod
spec:
  schedules:
    - "0 8 * * *"
  timezone: Europe/Berlin
  concurrencyPolicy: Allow
  workflowMetadata:
    labels:
      platform.example.com/environment: prod
  workflowSpec:
    entrypoint: main
    templates:
      - name: main
        steps:
          - - name: run
              templateRef:
                name: maik
                template: main
                clusterScope: false
              arguments:
                parameters:
                  - name: target-table
                    value: "test"
                  - name: batch-size
                    value: "100"