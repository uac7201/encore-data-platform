apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: maik-pipe
  namespace: sales-forecasting
  annotations:
    cronworkflows.argoproj.io/last-used-schedule: CRON_TZ=Europe/Berlin 0 6 * * *
spec:
  concurrencyPolicy: Allow
  schedules:
    - 0 6 * * *
  timezone: Europe/Berlin
  workflowSpec:
    entrypoint: main
    templates:
      - container:
          command:
            - python
            - main.py
          env:
            - name: ENV_VAR
              value: value
          image: registry.example.com/pipelines/my-pipeline:latest
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 550m
              memory: 256Mi
        name: main