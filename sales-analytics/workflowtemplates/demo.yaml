apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: demo
  namespace: sales-analytics
  labels:
    platform.example.com/category: connector
    platform.example.com/team: ""
  annotations:
    platform.example.com/description: bla
spec:
  templates:
    - container:
        args:
          - --table={{inputs.parameters.x}}
          - --batch-size={{inputs.parameters.y}}
        command:
          - python
          - main.py
        env:
          - name: DB_HOST
            value: postgres.internal
          - name: DB_NAME
            value: sales_db
          - name: DB_USER
            value: pipeline_user
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                key: password
                name: db-credentials
        image: registry.example.com/platform-connectors/connector-database:latest
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
      inputs:
        parameters:
          - name: x
            value: "1"
          - name: y
            value: "2"
      name: main