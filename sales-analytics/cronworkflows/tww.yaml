apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: tww
  namespace: sales-analytics
  labels:
    platform.example.com/environment: dev
spec:
  schedules:
    - "0 6 * * *"
  timezone: Europe/Berlin
  concurrencyPolicy: Allow
  workflowMetadata:
    labels:
      platform.example.com/environment: dev
  workflowSpec:
    entrypoint: main
    templates:
      - name: main
        steps:
          - - name: run
              templateRef:
                name: simple-cluster-workflow-template
                template: main
                clusterScope: true